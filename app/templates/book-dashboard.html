{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="page-container">

    <h2 class="page-title">Book Management Dashboard</h2>

    <div class="action-bar action-bar-top">
        <!-- Left: Back -->
        <div class="action-left">
            <a href="/" class="btn btn-secondary btn-sm">
                <i class="fa-solid fa-backward"></i> Back to Home
            </a>
        </div>

        <!-- Center: Filter -->
        <div class="action-center">
            <label for="filterPrice">Min Price:</label>
            <input type="number" id="filterPrice" placeholder="Enter minimum price" step="0.01">
            <button class="btn btn-primary btn-sm" onclick="filterBooksByPrice()">
                Filter
            </button>
            <button class="btn btn-secondary btn-sm" onclick="loadBooks()">
                Reset
            </button>
        </div>

        <!-- Right: Add Book -->
        <div class="action-right">
            <button class="btn btn-primary" onclick="openAddBookModal()">
                <i class="fa-solid fa-plus"></i> Add Book
            </button>
        </div>
    </div>


    <!-- Book Grid -->
    <div id="data-container" class="book-grid">
        <p>Loading books...</p>
    </div>

</div>


<!-- =========================
        Add Book Modal
========================= -->

<div id="popupOverlay" class="overlay">

    <div class="popup-content">

        <button class="btn btn-danger modal-close" onclick="closeAddBookModal()">✕</button>

        <h2>Add Book</h2>

        <form id="AddBookForm" class="book-form">

            <label>Title <span style="color: red;">&#42;</span></label>
            <input type="text" name="title" required>

            <label>Author <span style="color: red;">&#42;</span></label>
            <input type="text" name="author" required>

            <label>Year <span style="color: red;">&#42;</span></label>
            <input type="number" name="year">

            <label>Language <span style="color: red;">&#42;</span></label>
            <input type="text" name="language">

            <label>Price</label>
            <input type="number" name="price" step="0.01">

            <label>Images (paste link or Upload)</label>
            <input type="text" name="image">


            <!-- Custom Fields -->
            <h3>Custom Fields</h3>

            <div id="customFields"></div>

            <div style="margin-top:10px;">
                <button type="button" class="btn btn-secondary btn-sm" onclick="addField()">
                    + Add Field
                </button>
            </div>

            <div style="margin-top:15px;">
                <button type="submit" class="btn btn-success">
                    Save Book
                </button>
            </div>

        </form>

    </div>

</div>


<script>

    const overlay = document.getElementById("popupOverlay");
    const container = document.getElementById("data-container");
    const form = document.getElementById("AddBookForm");
    const customFields = document.getElementById("customFields");


    /* =========================
       Load Books
    ========================= */

    function loadBooks() {
        fetch('/api/books/list/')
            .then(res => res.json())
            .then(data => renderBooks(data))
            .catch(err => {
                console.error(err);
                container.innerHTML = "<p>❌ Failed to load books.</p>";
            });
    }

    loadBooks();

    function renderBooks(data) {
        container.innerHTML = "";

        if (!data.length) {
            container.innerHTML = "<p>No books available.</p>";
            return;
        }

        data.forEach(book => {
            const card = document.createElement("div");
            card.className = "book-card";

            card.innerHTML = `
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
            <div class="book-price">Price: ${book.price !== undefined ? book.price : '-'} ${book.currency || ''}</div>

            <a href="/books/${book._id}/" class="btn btn-primary btn-sm">
                View Details <i class="fa fa-book"></i>
            </a>
        `;

            container.appendChild(card);
        });
    }



    /* =========================
       Modal Controls
    ========================= */

    function openAddBookModal() {

        overlay.style.display = "flex";
        document.body.style.overflow = "hidden";

    }

    function closeAddBookModal() {

        overlay.style.display = "none";
        document.body.style.overflow = "auto";

    }



    /* =========================
       Close modal on outside click
    ========================= */

    overlay.addEventListener("click", function (event) {

        if (event.target === overlay) {
            closeAddBookModal();
        }

    });



    /* =========================
       ESC closes modal
    ========================= */

    document.addEventListener("keydown", function (event) {

        if (event.key === "Escape") {
            closeAddBookModal();
        }

    });



    /* =========================
       Add Custom Field
    ========================= */

    function addField() {

        const row = document.createElement("div");
        row.className = "custom-field-row";

        row.innerHTML = `
        <input type="text" placeholder="Field name" class="field-name">
        <input type="text" placeholder="Value" class="field-value">
        <button type="button" class="btn btn-danger btn-sm">✕</button>
    `;

        row.querySelector("button").onclick = () => row.remove();

        customFields.appendChild(row);

    }



    /* =========================
       Submit Form
    ========================= */

    form.addEventListener("submit", function (e) {

        e.preventDefault();

        const formData = new FormData(form);
        const newBook = Object.fromEntries(formData.entries());


        /* collect dynamic fields */

        const names = document.querySelectorAll(".field-name");
        const values = document.querySelectorAll(".field-value");

        names.forEach((name, index) => {

            if (name.value.trim()) {
                newBook[name.value.trim()] = values[index].value.trim();
            }

        });


        /* remove empty fields */

        Object.keys(newBook).forEach(key => {

            if (!newBook[key]) {
                delete newBook[key];
            }

        });


        fetch('/api/books/add/', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(newBook)
        })
            .then(res => res.json())
            .then(res => {

                if (res.msg && res.msg.includes("Successfully")) {

                    alert("✅ Book added successfully");

                    closeAddBookModal();
                    loadBooks();

                    form.reset();
                    customFields.innerHTML = "";

                }
                else {

                    alert("❌ Error: " + JSON.stringify(res));

                }

            })
            .catch(err => {

                console.error("Add book error:", err);
                alert("Server error while adding book");

            });

    });

    /* =========================
       Filter Books
    ========================= */

    function filterBooksByPrice() {
        const minPrice = document.getElementById("filterPrice").value;

        if (!minPrice) {
            alert("Please enter a price");
            return;
        }

        fetch(`/api/books/price/gt/${minPrice}/`)
            .then(res => res.json())
            .then(data => {
                if (!data.length) {
                    container.innerHTML = "<p>No books match this price filter.</p>";
                    return;
                }
                renderBooks(data);
            })
            .catch(err => {
                console.error("Price filter error:", err);
                container.innerHTML = "<p>❌ Failed to filter books by price.</p>";
            });
    }

    document.getElementById("filterPrice").addEventListener("input", filterBooksByPrice);

</script>
